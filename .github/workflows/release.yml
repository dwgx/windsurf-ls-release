name: release

on:
  push:
    branches-ignore:
      - main
      - master
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to process
        required: false
        default: all
        type: choice
        options:
          - all
          - stable
          - next
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  release:
    name: release (${{ matrix.channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel:
          - stable
          - next
    env:
      RELEASE_CHANNEL: ${{ matrix.channel }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Decide whether to run this channel
        id: channel_filter
        env:
          SELECTED_CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ -z "$SELECTED_CHANNEL" ] || [ "$SELECTED_CHANNEL" = "all" ] || [ "$SELECTED_CHANNEL" = "$RELEASE_CHANNEL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Note filtered channel
        if: steps.channel_filter.outputs.enabled != 'true'
        run: |
          {
            echo "## Skip ($RELEASE_CHANNEL)"
            echo "- workflow_dispatch input filtered out this channel"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Detect publish mode
        if: steps.channel_filter.outputs.enabled == 'true'
        id: publish_mode
        run: |
          echo "channel=$RELEASE_CHANNEL" >> "$GITHUB_STEP_SUMMARY"
          echo "ref_name=$GITHUB_REF_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "default_branch=${{ github.event.repository.default_branch }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "$GITHUB_REF_NAME" = "${{ github.event.repository.default_branch }}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create manifest directory
        if: steps.channel_filter.outputs.enabled == 'true'
        run: mkdir -p "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL"

      - name: Discover latest release
        if: steps.channel_filter.outputs.enabled == 'true'
        id: discover
        run: |
          python3 scripts/discover_release.py \
            --channel "$RELEASE_CHANNEL" \
            --manifest-out "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL/manifest.json"

      - name: Upload manifest artifact
        if: steps.channel_filter.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest-${{ matrix.channel }}
          path: ${{ runner.temp }}/windsurf-release/${{ matrix.channel }}/manifest.json

      - name: Check whether release already exists
        if: steps.channel_filter.outputs.enabled == 'true'
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.discover.outputs.tag }}
        run: |
          if [ "$GITHUB_REF_NAME" != "${{ github.event.repository.default_branch }}" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif gh release view "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write discovery summary
        if: steps.channel_filter.outputs.enabled == 'true'
        run: |
          {
            echo "## Discovery ($RELEASE_CHANNEL)"
            echo "- Channel: $RELEASE_CHANNEL"
            echo "- Version: ${{ steps.discover.outputs.version }}"
            echo "- Tag: ${{ steps.discover.outputs.tag }}"
            echo "- Skip existing release: ${{ steps.release_check.outputs.skip }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build extracted assets
        if: steps.channel_filter.outputs.enabled == 'true' && steps.release_check.outputs.skip != 'true'
        id: build_assets
        continue-on-error: true
        run: |
          mkdir -p "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL/dist"
          python3 scripts/build_assets.py \
            --manifest "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL/manifest.json" \
            --dist-dir "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL/dist" \
            --summary-out "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL/summary.json"

      - name: Upload extracted assets artifact
        if: always() && steps.channel_filter.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: windsurf-assets-${{ matrix.channel }}
          path: ${{ runner.temp }}/windsurf-release/${{ matrix.channel }}/dist
          if-no-files-found: ignore

      - name: Upload build summary artifact
        if: always() && steps.channel_filter.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-summary-${{ matrix.channel }}
          path: ${{ runner.temp }}/windsurf-release/${{ matrix.channel }}/summary.json
          if-no-files-found: ignore

      - name: Note skipped existing release
        if: steps.channel_filter.outputs.enabled == 'true' && steps.release_check.outputs.skip == 'true'
        run: |
          {
            echo "## Skip ($RELEASE_CHANNEL)"
            echo "- Release tag ${{ steps.discover.outputs.tag }} already exists on default branch"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note skipped publication on non-default branches
        if: steps.channel_filter.outputs.enabled == 'true' && steps.release_check.outputs.skip != 'true' && steps.publish_mode.outputs.publish != 'true'
        run: |
          {
            echo "## Branch validation ($RELEASE_CHANNEL)"
            echo "- Publish steps are skipped on branch $GITHUB_REF_NAME"
            echo "- Download the artifact named windsurf-assets-${RELEASE_CHANNEL} to inspect extracted binaries"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when required extraction fails
        if: steps.channel_filter.outputs.enabled == 'true' && steps.release_check.outputs.skip != 'true' && steps.build_assets.outcome != 'success'
        run: exit 1

      - name: Render release notes
        if: steps.channel_filter.outputs.enabled == 'true' && steps.release_check.outputs.skip != 'true' && steps.build_assets.outcome == 'success' && steps.publish_mode.outputs.publish == 'true'
        run: |
          python3 scripts/render_release_notes.py \
            --summary "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL/summary.json" \
            --output "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL/release-notes.md"

      - name: Compute release flags
        if: steps.channel_filter.outputs.enabled == 'true' && steps.release_check.outputs.skip != 'true' && steps.build_assets.outcome == 'success' && steps.publish_mode.outputs.publish == 'true'
        id: release_flags
        run: |
          if [ "$RELEASE_CHANNEL" = "next" ]; then
            echo "create_flags=--prerelease --latest=false" >> "$GITHUB_OUTPUT"
            echo "edit_flags=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "create_flags=--latest" >> "$GITHUB_OUTPUT"
            echo "edit_flags=--latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        if: steps.channel_filter.outputs.enabled == 'true' && steps.release_check.outputs.skip != 'true' && steps.build_assets.outcome == 'success' && steps.publish_mode.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.discover.outputs.tag }}
          RELEASE_NAME: ${{ steps.discover.outputs.release_name }}
        run: |
          gh release create "$TAG" \
            --draft \
            ${{ steps.release_flags.outputs.create_flags }} \
            --title "$RELEASE_NAME" \
            --notes-file "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL/release-notes.md"

      - name: Upload release assets
        if: steps.channel_filter.outputs.enabled == 'true' && steps.release_check.outputs.skip != 'true' && steps.build_assets.outcome == 'success' && steps.publish_mode.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.discover.outputs.tag }}
        run: |
          gh release upload "$TAG" "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL/dist/"* --clobber

      - name: Publish release
        if: steps.channel_filter.outputs.enabled == 'true' && steps.release_check.outputs.skip != 'true' && steps.build_assets.outcome == 'success' && steps.publish_mode.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.discover.outputs.tag }}
        run: |
          gh release edit "$TAG" \
            --draft=false \
            ${{ steps.release_flags.outputs.edit_flags }} \
            --notes-file "$RUNNER_TEMP/windsurf-release/$RELEASE_CHANNEL/release-notes.md"
